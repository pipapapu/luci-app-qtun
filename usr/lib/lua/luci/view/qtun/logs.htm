<%+header%>
<style>
    .tabs { display: flex; gap: 5px; margin-bottom: 0px; border-bottom: 1px solid #ccc; }
    .tab-btn { 
        padding: 10px 20px; cursor: pointer; border: 1px solid #ccc; 
        background: #f7f7f7; border-bottom: none; border-radius: 4px 4px 0 0;
    }
    .tab-btn.active { background: #007bff; color: white; border-color: #007bff; font-weight: bold; }
    .log-container { display: none; border: 1px solid #ccc; border-top: none; }
    .log-container.active { display: block; }
    .terminal {
        width: 100%; height: 450px; background: #000; color: #00ff00;
        font-family: monospace; padding: 12px; font-size: 12px;
        border: none; overflow-y: auto; white-space: pre-wrap; display: block;
    }
</style>

<div class="cbi-map">
    <h2>QTUN Dashboard Logs</h2>
    <div class="tabs">
        <div class="tab-btn active" onclick="openTab(event, 'tab-process')">QTUN Process</div>
        <div class="tab-btn" onclick="openTab(event, 'tab-core')">Core</div>
        <div class="tab-btn" onclick="openTab(event, 'tab-clash')">Clash</div>
    </div>

    <div id="tab-process" class="log-container active"><textarea id="log-process" class="terminal" readonly></textarea></div>
    <div id="tab-core" class="log-container"><textarea id="log-core" class="terminal" readonly></textarea></div>
    <div id="tab-clash" class="log-container"><textarea id="log-clash" class="terminal" readonly></textarea></div>

    <button class="cbi-button cbi-button-apply" onclick="fetchAllLogs()">Refresh Now</button>
</div>

<script type="text/javascript">
    function openTab(evt, tabName) {
        var i, content, btns;
        content = document.getElementsByClassName("log-container");
        for (i = 0; i < content.length; i++) content[i].classList.remove("active");
        btns = document.getElementsByClassName("tab-btn");
        for (i = 0; i < btns.length; i++) btns[i].classList.remove("active");
        document.getElementById(tabName).classList.add("active");
        evt.currentTarget.classList.add("active");
    }

    /* FIX fetchAllLogs */
    function fetchAllLogs() {
        XHR.get('<%=luci.dispatcher.build_url("admin", "services", "qtun", "get_log")%>', null,
            function(x, data) {
                if (!data) return;

                updateArea("log-process", data.process || "Belum ada log proses.");
                updateArea("log-core", data.core || data.zivpn || "Belum ada log core.");
                updateArea("log-clash", data.clash || "Belum ada log clash.");
            }
        );
    }

    function updateArea(id, text) {
        var el = document.getElementById(id);
        var shouldScroll = el.scrollHeight - el.clientHeight <= el.scrollTop + 10;
        el.value = text;
        if (shouldScroll) el.scrollTop = el.scrollHeight;
    }

    setInterval(fetchAllLogs, 3000);
    window.onload = fetchAllLogs;
</script>
<%+footer%>
