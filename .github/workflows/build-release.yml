name: Build & Release luci-app-qtun

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (contoh: v1.0.1)"
        required: true
        default: "v1.0.1"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            target: x86
            subtarget: 64

          - arch: arm64
            target: armsr
            subtarget: armv8

          - arch: arm
            target: armvirt
            subtarget: 32

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
            gettext git libncurses5-dev libssl-dev python3-distutils rsync \
            unzip zlib1g-dev file wget curl jq ca-certificates

      - name: Clone OpenWrt
        run: |
          git clone --depth 1 https://github.com/openwrt/openwrt.git openwrt
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install luci

      - name: Copy package into OpenWrt tree
        run: |
          mkdir -p openwrt/package/luci-app-qtun
          rsync -av \
            --exclude=openwrt \
            --exclude=.git \
            --exclude=.github \
            ./ openwrt/package/luci-app-qtun/

      - name: Configure target
        run: |
          cd openwrt
          cat > .config <<EOF
          CONFIG_TARGET_${{ matrix.target }}=y
          CONFIG_TARGET_${{ matrix.target }}_${{ matrix.subtarget }}=y
          CONFIG_PACKAGE_luci-app-qtun=y
          EOF
          make defconfig

      - name: Build package
        run: |
          cd openwrt
          make package/luci-app-qtun/compile V=s -j$(nproc)

      - name: Collect packages
        run: |
          mkdir -p release
          find openwrt/bin/packages/ -type f -name "*.ipk" | while read file; do
            base=$(basename "$file")
            cp "$file" "release/${base%.ipk}_${{ matrix.arch }}.ipk"
          done

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-qtun-${{ matrix.arch }}
          path: release/*.ipk

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag }}
          name: luci-app-qtun ${{ github.event.inputs.tag }}
          draft: false
          prerelease: false
          files: artifacts/**/*.ipk
