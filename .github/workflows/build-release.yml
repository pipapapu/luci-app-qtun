name: Build & Release luci-app-qtun

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.0.1)"
        required: true
        default: "v1.0.1"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.arch }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            sdk_url: https://downloads.openwrt.org/releases/23.05.0/targets/x86/64/openwrt-sdk-23.05.0-x86-64_gcc-12.3.0_musl.Linux-x86_64.tar.xz
          - arch: arm64
            sdk_url: https://downloads.openwrt.org/releases/23.05.0/targets/armsr/armv8/openwrt-sdk-23.05.0-armsr-armv8_gcc-12.3.0_musl.Linux-x86_64.tar.xz
          - arch: arm
            sdk_url: https://downloads.openwrt.org/releases/23.05.0/targets/armsr/armv7/openwrt-sdk-23.05.0-armsr-armv7_gcc-12.3.0_musl_eabi.Linux-x86_64.tar.xz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Version from Tag
        run: |
          VERSION="${{ github.event.inputs.tag }}"
          VERSION="${VERSION#v}"
          echo "QTUN_VERSION=$VERSION" >> $GITHUB_ENV

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential clang flex bison gawk gettext git \
            libncurses5-dev libssl-dev python3-setuptools \
            rsync unzip zlib1g-dev file wget curl

      - name: Setup SDK
        run: |
          wget -O sdk.tar.xz "${{ matrix.sdk_url }}"
          mkdir sdk
          tar -xf sdk.tar.xz -C sdk --strip-components=1

          cd sdk
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Inject Dynamic Version into Makefile
        run: |
          mkdir -p workdir
          rsync -av ./ workdir/ \
            --exclude=sdk \
            --exclude=workdir \
            --exclude=.git \
            --exclude=.github

          sed -i "s/^PKG_VERSION:=.*/PKG_VERSION:=${QTUN_VERSION}/" workdir/Makefile

          echo "==== Patched Makefile ===="
          grep "^PKG_VERSION" workdir/Makefile

      - name: Build Package
        run: |
          cd sdk
          mkdir -p package/luci-app-qtun
          rsync -av ../workdir/ package/luci-app-qtun/

          make defconfig
          make package/luci-app-qtun/compile V=s

      - name: Collect Artifacts
        run: |
          mkdir -p release

          find sdk/bin/packages/ -type f -name "luci-app-qtun*.ipk" -exec cp {} release/ \;

          cd release
          for f in *.ipk; do
            BASENAME="${f%%_*}"
            mv "$f" "${BASENAME}_${QTUN_VERSION}_${{ matrix.arch }}.ipk"
          done

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: qtun-${{ matrix.arch }}
          path: release/*.ipk

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./all-artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag }}
          name: Release ${{ github.event.inputs.tag }}
          files: ./all-artifacts/*.ipk
          token: ${{ secrets.GITHUB_TOKEN }}

  bump-makefile:
    name: Update Makefile Version
    needs: release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update PKG_VERSION
        run: |
          VERSION="${{ github.event.inputs.tag }}"
          VERSION="${VERSION#v}"

          sed -i "s/^PKG_VERSION:=.*/PKG_VERSION:=${VERSION}/" Makefile

          echo "==== Updated Makefile ===="
          grep "^PKG_VERSION" Makefile

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add Makefile

          if git diff --cached --quiet; then
            echo "No version change detected."
          else
            git commit -m "Bump PKG_VERSION to ${{ github.event.inputs.tag }}"
            git push
          fi