name: Build & Release luci-app-qtun

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.0.1 or v1.0.1-r2)"
        required: true
        default: "v1.0.1"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.arch }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            target: x86/64
          - arch: aarch64_generic
            target: armsr/armv8
          - arch: aarch64_cortex-a53
            target: sunxi/cortexa53
          - arch: arm_cortex-a7_neon-vfpv4
            target: sunxi/cortexa7
          - arch: arm_cortex-a9
            target: mvebu/cortexa9

    env:
      OWRT_VER: 23.05.0

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Parse Tag
        run: |
          RAW="${{ github.event.inputs.tag }}"
          RAW="${RAW#v}"

          if echo "$RAW" | grep -q -- "-r"; then
            VERSION="${RAW%-r*}"
            RELEASE="${RAW##*-r}"
            FINAL_VERSION="${VERSION}-${RELEASE}"
          else
            VERSION="$RAW"
            RELEASE="1"
            FINAL_VERSION="${VERSION}"
          fi

          echo "QTUN_VERSION=$VERSION" >> $GITHUB_ENV
          echo "QTUN_RELEASE=$RELEASE" >> $GITHUB_ENV
          echo "QTUN_FINAL_VERSION=$FINAL_VERSION" >> $GITHUB_ENV

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential clang flex bison gawk gettext git \
            libncurses5-dev libssl-dev python3-setuptools \
            rsync unzip zlib1g-dev file wget curl

      - name: Setup SDK
        run: |
          TARGET="$(echo '${{ matrix.target }}' | tr '/' '-')"

          SDK_URL="https://downloads.openwrt.org/releases/${OWRT_VER}/targets/${{ matrix.target }}/openwrt-sdk-${OWRT_VER}-${TARGET}_gcc-12.3.0_musl.Linux-x86_64.tar.xz"

          echo "$SDK_URL"

          wget -O sdk.tar.xz "$SDK_URL"

          mkdir sdk
          tar -xf sdk.tar.xz -C sdk --strip-components=1

          cd sdk
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Inject Dynamic Version into Makefile
        run: |
          mkdir -p workdir
          rsync -av ./ workdir/ \
            --exclude=sdk \
            --exclude=workdir \
            --exclude=.git \
            --exclude=.github

          sed -i "s/^PKG_VERSION:=.*/PKG_VERSION:=${QTUN_VERSION}/" workdir/Makefile
          sed -i "s/^PKG_RELEASE:=.*/PKG_RELEASE:=${QTUN_RELEASE}/" workdir/Makefile

          echo "==== Patched Makefile ===="
          grep "^PKG_VERSION" workdir/Makefile
          grep "^PKG_RELEASE" workdir/Makefile

      - name: Build Package
        run: |
          cd sdk
          mkdir -p package/luci-app-qtun
          rsync -av ../workdir/ package/luci-app-qtun/

          make defconfig
          make package/luci-app-qtun/compile V=s

      - name: Collect Artifacts
        run: |
          mkdir -p release

          find sdk/bin/packages/ -type f -name "luci-app-qtun*.ipk" | while read f; do
            NEW_NAME="luci-app-qtun_${QTUN_FINAL_VERSION}_${{ matrix.arch }}.ipk"
            cp "$f" "release/$NEW_NAME"
          done

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: qtun-${{ matrix.arch }}
          path: release/*.ipk

  build-apk:
    name: Build APK (${{ matrix.arch }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            target: x86/64
          - arch: aarch64_generic
            target: armsr/armv8
          - arch: aarch64_cortex-a53
            target: sunxi/cortexa53
          - arch: arm_cortex-a7_neon-vfpv4
            target: sunxi/cortexa7
          - arch: arm_cortex-a9
            target: mvebu/cortexa9

    env:
      OWRT_VER: 25.12.0

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Parse Tag
        run: |
          RAW="${{ github.event.inputs.tag }}"
          RAW="${RAW#v}"

          if echo "$RAW" | grep -q -- "-r"; then
            VERSION="${RAW%-r*}"
            RELEASE="${RAW##*-r}"
            FINAL_VERSION="${VERSION}-${RELEASE}"
          else
            VERSION="$RAW"
            RELEASE="1"
            FINAL_VERSION="${VERSION}"
          fi

          echo "QTUN_VERSION=$VERSION" >> $GITHUB_ENV
          echo "QTUN_RELEASE=$RELEASE" >> $GITHUB_ENV
          echo "QTUN_FINAL_VERSION=$FINAL_VERSION" >> $GITHUB_ENV

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential clang flex bison gawk gettext git \
            libncurses5-dev libssl-dev python3-setuptools \
            rsync unzip zlib1g-dev file wget curl zstd

      - name: Setup SDK
        run: |
          TARGET="$(echo '${{ matrix.target }}' | tr '/' '-')"

          SDK_URL="https://downloads.openwrt.org/releases/${OWRT_VER}/targets/${{ matrix.target }}/openwrt-sdk-${OWRT_VER}-${TARGET}_gcc-14.3.0_musl.Linux-x86_64.tar.zst"

          echo "$SDK_URL"

          wget -O sdk.tar.zst "$SDK_URL"

          mkdir sdk
          tar --use-compress-program=unzstd -xf sdk.tar.zst -C sdk --strip-components=1

          cd sdk
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Inject Dynamic Version into Makefile
        run: |
          mkdir -p workdir
          rsync -av ./ workdir/ \
            --exclude=sdk \
            --exclude=workdir \
            --exclude=.git \
            --exclude=.github

          sed -i "s/^PKG_VERSION:=.*/PKG_VERSION:=${QTUN_VERSION}/" workdir/Makefile
          sed -i "s/^PKG_RELEASE:=.*/PKG_RELEASE:=${QTUN_RELEASE}/" workdir/Makefile

      - name: Build Package
        run: |
          cd sdk
          mkdir -p package/luci-app-qtun
          rsync -av ../workdir/ package/luci-app-qtun/

          make defconfig
          make package/luci-app-qtun/compile V=s

      - name: Collect APK Artifacts
        run: |
          mkdir -p release

          find sdk/bin/packages/ -type f -name "luci-app-qtun*.apk" | while read f; do
            cp "$f" "release/luci-app-qtun_${QTUN_FINAL_VERSION}_${{ matrix.arch }}.apk"
          done

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: qtun-apk-${{ matrix.arch }}
          path: release/*.apk

  release:
    name: Create GitHub Release
    needs: [build, build-apk]
    runs-on: ubuntu-latest

    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./all-artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag }}
          name: Release ${{ github.event.inputs.tag }}
          files: |
            ./all-artifacts/*.ipk
            ./all-artifacts/*.apk
          token: ${{ secrets.GITHUB_TOKEN }}

  bump-makefile:
    name: Update Makefile Version
    needs: release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update PKG_VERSION & PKG_RELEASE
        run: |
          RAW="${{ github.event.inputs.tag }}"
          RAW="${RAW#v}"

          if echo "$RAW" | grep -q -- "-r"; then
            VERSION="${RAW%-r*}"
            RELEASE="${RAW##*-r}"
          else
            VERSION="$RAW"
            RELEASE="1"
          fi

          sed -i "s/^PKG_VERSION:=.*/PKG_VERSION:=${VERSION}/" Makefile
          sed -i "s/^PKG_RELEASE:=.*/PKG_RELEASE:=${RELEASE}/" Makefile

          echo "==== Updated Makefile ===="
          grep "^PKG_VERSION" Makefile
          grep "^PKG_RELEASE" Makefile

          echo "QTUN_VERSION=${VERSION}" >> $GITHUB_ENV
          echo "QTUN_RELEASE=${RELEASE}" >> $GITHUB_ENV

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add Makefile

          if git diff --cached --quiet; then
            echo "No version change detected."
          else
            git commit -m "Bump QTUN to v${QTUN_VERSION}-r${QTUN_RELEASE}"
            git push
          fi